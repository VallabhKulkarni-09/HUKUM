name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hukum_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=API_URL=https://hukum-server-512365624933.us-central1.run.app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hukum-apk-${{ github.sha }}
          path: hukum_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: hukum_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
